<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HüseyinAI - Kişisel Yapay Zeka Asistanınız. Sorularınızı yanıtlayan akıllı sohbet robotu.">
    <title>HüseyinAI — Kişisel Yapay Zeka Asistanınız</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 40 40" fill="none">
                            <defs>
                                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#7c3aed"/>
                                    <stop offset="50%" style="stop-color:#06b6d4"/>
                                    <stop offset="100%" style="stop-color:#10b981"/>
                                </linearGradient>
                            </defs>
                            <circle cx="20" cy="20" r="18" stroke="url(#logoGrad)" stroke-width="2.5" fill="none"/>
                            <path d="M13 20C13 16.134 16.134 13 20 13C23.866 13 27 16.134 27 20" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round"/>
                            <circle cx="20" cy="20" r="3" fill="url(#logoGrad)"/>
                            <path d="M20 23V28" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round"/>
                            <path d="M15 25L17 23" stroke="url(#logoGrad)" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M25 25L23 23" stroke="url(#logoGrad)" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="logo-text">
                        <h1>HüseyinAI</h1>
                        <span class="logo-badge">v3.0</span>
                    </div>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle" aria-label="Menüyü kapat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </button>
            </div>

            <button class="new-chat-btn" id="newChatBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
                Yeni Sohbet
            </button>

            <div class="sidebar-section">
                <h3 class="sidebar-section-title">Sohbet Geçmişi</h3>
                <div class="chat-history" id="chatHistory"></div>
            </div>

            <div class="sidebar-footer">
                <div class="ai-status">
                    <div class="status-dot"></div>
                    <span>AI Çevrimiçi</span>
                </div>
                <div class="model-info">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                    <span>HüseyinAI Turbo</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-content">
            <header class="top-bar">
                <button class="menu-btn" id="menuBtn" aria-label="Menüyü aç">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12h18M3 6h18M3 18h18"/>
                    </svg>
                </button>
                <div class="top-bar-title">
                    <h2 id="chatTitle">Yeni Sohbet</h2>
                    <span class="top-bar-subtitle">HüseyinAI ile sohbet ediyorsunuz</span>
                </div>
                <div class="top-bar-actions">
                    <button class="icon-btn" id="clearChatBtn" title="Sohbeti temizle">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="chat-container" id="chatContainer">
                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-screen" id="welcomeScreen">
                        <div class="welcome-icon">
                            <div class="welcome-icon-inner">
                                <svg viewBox="0 0 80 80" fill="none">
                                    <defs>
                                        <linearGradient id="welcomeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                            <stop offset="0%" style="stop-color:#7c3aed"/>
                                            <stop offset="50%" style="stop-color:#06b6d4"/>
                                            <stop offset="100%" style="stop-color:#10b981"/>
                                        </linearGradient>
                                    </defs>
                                    <circle cx="40" cy="40" r="35" stroke="url(#welcomeGrad)" stroke-width="2" fill="none" opacity="0.3"/>
                                    <circle cx="40" cy="40" r="25" stroke="url(#welcomeGrad)" stroke-width="2" fill="none" opacity="0.5"/>
                                    <circle cx="40" cy="40" r="6" fill="url(#welcomeGrad)"/>
                                    <path d="M26 40C26 32.268 32.268 26 40 26C47.732 26 54 32.268 54 40" stroke="url(#welcomeGrad)" stroke-width="2.5" stroke-linecap="round"/>
                                    <path d="M40 46V56" stroke="url(#welcomeGrad)" stroke-width="2.5" stroke-linecap="round"/>
                                    <path d="M30 52L35 47" stroke="url(#welcomeGrad)" stroke-width="2" stroke-linecap="round"/>
                                    <path d="M50 52L45 47" stroke="url(#welcomeGrad)" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                            </div>
                            <div class="welcome-pulse"></div>
                        </div>
                        <h2 class="welcome-title">Merhaba, Ben <span class="gradient-text">HüseyinAI</span></h2>
                        <p class="welcome-subtitle">Kişisel yapay zeka asistanınızım. Size nasıl yardımcı olabilirim?</p>
                        <div class="suggestion-cards">
                            <button class="suggestion-card" data-prompt="Bana kendinden bahset, neler yapabilirsin?">
                                <div class="suggestion-icon">🤖</div>
                                <div class="suggestion-text"><strong>Kendini Tanıt</strong><span>Neler yapabilirsin?</span></div>
                            </button>
                            <button class="suggestion-card" data-prompt="Yapay zeka nedir ve nasıl çalışır?">
                                <div class="suggestion-icon">🧠</div>
                                <div class="suggestion-text"><strong>Yapay Zeka</strong><span>AI nedir, nasıl çalışır?</span></div>
                            </button>
                            <button class="suggestion-card" data-prompt="Bana kısa bir bilim kurgu hikayesi yaz">
                                <div class="suggestion-icon">✍️</div>
                                <div class="suggestion-text"><strong>Hikaye Yaz</strong><span>Yaratıcı bir hikaye oluştur</span></div>
                            </button>
                            <button class="suggestion-card" data-prompt="JavaScript ile basit bir oyun nasıl yapılır?">
                                <div class="suggestion-icon">💻</div>
                                <div class="suggestion-text"><strong>Kod Yardımı</strong><span>Programlama konusunda yardım</span></div>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <div class="input-container">
                        <textarea id="messageInput" placeholder="Mesajınızı yazın..." rows="1" aria-label="Mesaj giriş alanı"></textarea>
                        <div class="input-actions">
                            <span class="char-count" id="charCount">0</span>
                            <button class="send-btn" id="sendBtn" disabled aria-label="Mesaj gönder">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <p class="input-hint">HüseyinAI hata yapabilir. Önemli bilgileri doğrulayın.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
